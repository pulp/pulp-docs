---
name: "Tests"

on:
  workflow_call:

jobs:
  unit:
    runs-on: "ubuntu-latest"
    steps:
      - uses: "actions/checkout@v6"

      - name: "Set up uv"
        uses: "astral-sh/setup-uv@v5"
        with:
          python-version: "3.12"

      - name: "Run unit tests"
        run: |
          make test

  integration:
    runs-on: "ubuntu-latest"
    needs: "unit"
    steps:
      - uses: "actions/checkout@v6"

      - name: "Set up uv"
        uses: "astral-sh/setup-uv@v5"
        with:
          python-version: "3.12"

      - name: "Run integration tests"
        run: |
          make test-integration
